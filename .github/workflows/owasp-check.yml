name: OWASP Dependency Check

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Workspace package names
        workspace:
          - "@dittolive/ditto-chat-core"
          - "@dittolive/ditto-chat-ui"
        include:
          - workspace: "@dittolive/ditto-chat-core"
            path: "sdks/js/ditto-chat-core"
          - workspace: "@dittolive/ditto-chat-ui"
            path: "sdks/js/ditto-chat-ui"
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Create suppression file
        run: |
          cat > suppression.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
           <suppressions xmlns="https://jeremylong.github.io/DependencyCheck/dependency-suppression.1.3.xsd">
            <!-- Suppress non-Node.js files: binaries, CocoaPods, Gradle, Xcode -->
            <suppress>
              <filePath regex="true">.*((node_modules.*\.(dll|exe|so|dylib|msi))|\.podspec|/Podfile(\.lock)?|/Pods/.*|\.gradle|/gradlew(\.bat)?|\.(xcodeproj|xcworkspace)/.*)$</filePath>
              <cpe regex="true">.*</cpe>
            </suppress>
          </suppressions>
          EOF

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        id: depcheck
        with:
          project: "${{ matrix.workspace }}"
          path: "${{ matrix.path }}"
          format: "HTML,JSON"
          args: >
            -s "${{ matrix.path }}/package.json"
            -s "package-lock.json"
            --enableExperimental
            --suppression suppression.xml
            --failOnCVSS 7

      - name: Upload Dependency-Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report-${{ matrix.path == 'sdks/js/ditto-chat-core' && 'core' || 'ui' }}
          path: reports/
          retention-days: 15

      - name: Generate Vulnerability Summary
        if: always()
        id: summary
        run: |
          WORKSPACE="${{ matrix.workspace }}"
          REPORT_FILE="reports/dependency-check-report.json"

          if [ -f "$REPORT_FILE" ]; then
            # Extract vulnerability counts (handle both uppercase and lowercase severity values)
            CRITICAL=$(jq '[.dependencies[].vulnerabilities[]? | select(.severity == "CRITICAL" or .severity == "critical")] | length' "$REPORT_FILE")
            HIGH=$(jq '[.dependencies[].vulnerabilities[]? | select(.severity == "HIGH" or .severity == "high")] | length' "$REPORT_FILE")
            MEDIUM=$(jq '[.dependencies[].vulnerabilities[]? | select(.severity == "MEDIUM" or .severity == "moderate")] | length' "$REPORT_FILE")
            LOW=$(jq '[.dependencies[].vulnerabilities[]? | select(.severity == "LOW" or .severity == "low")] | length' "$REPORT_FILE")
            TOTAL=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")

            {
              echo "critical=$CRITICAL"
              echo "high=$HIGH"
              echo "medium=$MEDIUM"
              echo "low=$LOW"
              echo "total=$TOTAL"
              echo "workspace=$WORKSPACE"
            } >> "$GITHUB_OUTPUT"

            # Write markdown summary for issue body
            {
              echo "## OWASP Dependency Check — \`$WORKSPACE\`"
              echo ""
              echo "| Severity | Count |"
              echo "|----------|------:|"
              echo "| Critical | $CRITICAL |"
              echo "| High     | $HIGH |"
              echo "| Medium   | $MEDIUM |"
              echo "| Low      | $LOW |"
              echo "| **Total**| **$TOTAL** |"
              echo ""
              if [ "$TOTAL" -gt 0 ]; then
                echo "### Vulnerability Details"
                echo ""
                jq -r '.dependencies[] | select(.vulnerabilities) | .fileName as $file | .vulnerabilities[] | "- **\(.name)** (\(.severity)) in `\($file)`\n  CVSS: \(.cvssv3.baseScore // .cvssv2.score // "N/A")"' "$REPORT_FILE" | head -n 60
              fi
              echo ""
              echo "[View full artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            } > vuln-summary-${{ matrix.path == 'sdks/js/ditto-chat-core' && 'core' || 'ui' }}.md
          else
            {
              echo "critical=0"
              echo "high=0"
              echo "medium=0"
              echo "low=0"
              echo "total=0"
              echo "workspace=$WORKSPACE"
            } >> "$GITHUB_OUTPUT"
            echo "No report generated for $WORKSPACE." > vuln-summary-${{ matrix.path == 'sdks/js/ditto-chat-core' && 'core' || 'ui' }}.md
          fi

      - name: Upload vulnerability summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vuln-summary-${{ matrix.path == 'sdks/js/ditto-chat-core' && 'core' || 'ui' }}
          path: vuln-summary-${{ matrix.path == 'sdks/js/ditto-chat-core' && 'core' || 'ui' }}.md
          retention-days: 7

  open-issue-on-failure:
    runs-on: ubuntu-latest
    needs: [dependency-check]
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download vulnerability summaries
        uses: actions/download-artifact@v4
        with:
          pattern: vuln-summary-*
          merge-multiple: true

      - name: Build combined issue body
        run: |
          {
            echo "# OWASP Dependency Check Failures"
            echo ""
            echo "The scheduled OWASP dependency check detected vulnerabilities."
            echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            for f in vuln-summary-*.md; do
              [ -f "$f" ] && cat "$f" && echo ""
            done
          } > issue-body.md

      - name: Create or update tracking issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "OWASP Dependency Check failures"
          content-filepath: issue-body.md
          labels: security
          token: ${{ secrets.GITHUB_TOKEN }}
